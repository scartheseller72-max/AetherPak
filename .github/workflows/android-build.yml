name: AetherPak CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  # Rust Android targets -> AGP ABI directory names handled by cargo-ndk.
  ANDROID_TARGETS: "aarch64-linux-android armv7-linux-androideabi x86_64-linux-android"

jobs:
  build:
    name: Build native core + APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- JDK -------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ---- Android SDK + NDK ----------------------------------------------
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager "ndk;26.1.10909125" "cmake;3.22.1" >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      # ---- Rust toolchain + cargo-ndk -------------------------------------
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/aetherpak-core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('rust/aetherpak-core/Cargo.toml') }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # ---- Build the Rust native core into jniLibs ------------------------
      - name: Build native core (libaetherpak.so) for all ABIs
        working-directory: rust/aetherpak-core
        run: |
          cargo ndk \
            -t aarch64-linux-android \
            -t armv7-linux-androideabi \
            -t x86_64-linux-android \
            -o ../../core/compress/src/main/jniLibs \
            build --release
          echo "Produced native libraries:"
          find ../../core/compress/src/main/jniLibs -name 'libaetherpak.so' -exec ls -la {} +

      # ---- Materialize the Gradle wrapper jar (not committed) -------------
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.9

      # ---- Assemble APKs ---------------------------------------------------
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Decode keystore (release, optional)
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
          cat > keystore.properties <<EOF
          storeFile=$(pwd)/release.keystore
          storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}
          keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      # ---- Publish artifacts ----------------------------------------------
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aetherpak-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: aetherpak-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Attach APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
